<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cretyz Brawl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
        
        /* [1] 로그인 화면 스타일 */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1e1e2f, #11111e); z-index: 99999;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 90%; max-width: 400px; color: white;
        }
        .login-box h1 { margin-bottom: 24px; font-size: 2.5rem; color: #00ffcc; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 20px; border: none; border-radius: 6px;
            background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 1rem; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background: #00ffcc; color: #111; font-size: 1rem; font-weight: bold; cursor: pointer;
        }

        /* [2] 게임 전용 화면 스타일 (처음엔 완전히 숨겨둠) */
        #gameScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; /* 로그인 전에는 아예 보이지도 않게 처리 */
            z-index: 1; 
        }
        #gameCanvas { width: 100%; height: 100%; display: block; }
        #uiOverlay { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; color: #00ffcc; z-index: 10; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1>CRETYZ</h1>
            <div style="display: flex; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1);">
                <div id="goLogin" style="flex: 1; padding: 10px; cursor: pointer; color: #00ffcc; font-weight: bold;">로그인</div>
                <div id="goRegister" style="flex: 1; padding: 10px; cursor: pointer; color: #aaa;">회원가입</div>
            </div>
            <input type="text" id="myId" placeholder="아이디를 입력하세요">
            <input type="password" id="myPw" placeholder="비밀번호를 입력하세요">
            <div id="msg" style="color: #ff4444; font-size: 0.9rem; margin-bottom: 15px; min-height: 20px;"></div>
            <button id="mainBtn">로그인</button>
        </div>
    </div>

    <div id="gameScreen">
        <div id="uiOverlay">PLAYER: <span id="playerTagName">-</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- [Part 1: 로그인 시스템 및 화면 전환 로직] ---
        const goLogin = document.getElementById('goLogin');
        const goRegister = document.getElementById('goRegister');
        const myId = document.getElementById('myId');
        const myPw = document.getElementById('myPw');
        const mainBtn = document.getElementById('mainBtn');
        const msg = document.getElementById('msg');
        const loginScreen = document.getElementById('loginScreen');
        const gameScreen = document.getElementById('gameScreen');
        const playerTagName = document.getElementById('playerTagName');

        let mode = 'login';

        goLogin.addEventListener('click', () => { mode = 'login'; goLogin.style.color = '#00ffcc'; goRegister.style.color = '#aaa'; mainBtn.innerText = '로그인'; msg.innerText = ''; });
        goRegister.addEventListener('click', () => { mode = 'register'; goRegister.style.color = '#00ffcc'; goLogin.style.color = '#aaa'; mainBtn.innerText = '회원가입 완료'; msg.innerText = ''; });

        mainBtn.addEventListener('click', () => {
            const id = myId.value.trim();
            const pw = myPw.value.trim();
            if (!id || !pw) { msg.innerText = '모두 입력해주세요!'; return; }

            if (mode === 'register') {
                if (localStorage.getItem('user_' + id)) { msg.innerText = '이미 존재하는 아이디입니다.'; }
                else { localStorage.setItem('user_' + id, pw); msg.style.color = '#00ffcc'; msg.innerText = '가입 완료! 로그인 해주세요.'; goLogin.click(); }
            } else {
                if (localStorage.getItem('user_' + id) === pw) {
                    // [핵심] 로그인 화면 완전히 지우고, 게임 화면 강제로 켜기!
                    loginScreen.style.display = 'none';
                    gameScreen.style.display = 'block'; 
                    playerTagName.innerText = id;
                    
                    // 화면 켜진 뒤에 안전하게 게임 엔진 시작!
                    initGame(); 
                } else { msg.style.color = '#ff4444'; msg.innerText = '아이디 또는 비밀번호가 틀렸습니다.'; }
            }
        });

        // --- [Part 2: 2D 액션 게임 소스 코드] ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 300, y: 300, radius: 20, speed: 5, color: '#00ffcc' };
        let bullets = [];
        let keys = {};

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        // 마우스 클릭 시 총알 발사
        window.addEventListener('click', (e) => {
            // 게임 스크린이 열려 있을 때만 마우스 발사 작동하게 가드 침
            if (gameScreen.style.display === 'block') {
                let dx = e.clientX - player.x;
                let dy = e.clientY - player.y;
                let angle = Math.atan2(dy, dx);

                bullets.push({
                    x: player.x,
                    y: player.y,
                    radius: 5,
                    vx: Math.cos(angle) * 10,
                    vy: Math.sin(angle) * 10,
                    color: '#ff0055'
                });
            }
        });

        function initGame() {
            // 캔버스 크기를 현재 브라우저 창 크기에 맞춤
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gameLoop();
        }

        function update() {
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;

                if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 배경 격자선
            ctx.strokeStyle = '#222';
            for (let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for (let i = 0; i < canvas.height; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

            // 총알 그리기
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 플레이어 그리기 (네온 원)
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            if (gameScreen.style.display === 'block') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // 1. 3D 무대 및 카메라, 화가(렌더러) 준비
    let scene, camera, renderer;
    let pBox3D, tower3D; // 3D 물체들을 담을 변수
    let bullets3D = [];  // 3D 총알들을 담을 배열

    function init3DWorld() {
        scene = new THREE.Scene();
        
        // 하늘에서 아래를 내려다보는 시원한 탑뷰 카메라 세팅
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 15); 
        camera.lookAt(0, 0, 0);

        // 2D 화면 위에 투명하게 겹쳐지도록 3D 화가 배치
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '2'; // 2D 캔버스(1) 바로 위에 노출!
        renderer.domElement.style.pointerEvents = 'none'; // 마우스 클릭이 2D 판에 가도록 통과
        document.body.appendChild(renderer.domElement);

        // 네온 느낌을 살려줄 화려한 조명 추가
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x00ffcc, 1.0);
        dirLight.position.set(5, 20, 7);
        scene.add(dirLight);

        // [3D 캐릭터 생성] 네온 블루 컬러의 세련된 입체 상자
        const pGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const pMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, roughness: 0.2 });
        pBox3D = new THREE.Mesh(pGeo, pMat);
        scene.add(pBox3D);

        // [3D 디펜스 타워 생성] 화면 우측에 우뚝 선 원통 포탑
        const tGeo = new THREE.CylinderGeometry(0.5, 0.7, 2, 16);
        const tMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.6 });
        tower3D = new THREE.Mesh(tGeo, tMat);
        tower3D.position.set(3, 1, -2); // 고정 배치 위치
        scene.add(tower3D);

        // 매 프레임마다 2D 좌표를 3D 공간 좌표로 변환하여 동기화하는 루프
        function animate3D() {
            requestAnimationFrame(animate3D);

            // 타워는 살아있는 것처럼 스스로 슬쩍 회전
            if (tower3D) tower3D.rotation.y += 0.01;

            // 핵심: 2D 플레이어(pChar)의 모니터 좌표를 3D 세상의 가로/세로(X, Z)로 변환!
            if (pBox3D && typeof pChar !== 'undefined') {
                pBox3D.position.x = (pChar.x - window.innerWidth / 2) * 0.02;
                pBox3D.position.z = (pChar.y - window.innerHeight / 2) * 0.02;
                pBox3D.rotation.x += 0.02; // 달릴 때 박스가 구르는 효과!
                pBox3D.rotation.y += 0.02;
            }

            // 2D 총알들과 3D 총알들의 위치 싱크 맞추기
            if (typeof gameBullets !== 'undefined') {
                // 기존 3D 총알 싹 비우고 2D 총알 개수만큼 다시 그리기
                bullets3D.forEach(b => scene.add(b)); // 안전하게 메모리 해제는 Threejs가 처리
                
                // 효율적인 렌더링을 위해 루프 돌며 위치 매핑
                while(bullets3D.length < gameBullets.length) {
                    const bGeo = new THREE.SphereGeometry(0.15, 8, 8);
                    const bMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });
                    const bMesh = new THREE.Mesh(bGeo, bMat);
                    scene.add(bMesh);
                    bullets3D.push(bMesh);
                }
                while(bullets3D.length > gameBullets.length) {
                    const removed = bullets3D.pop();
                    scene.remove(removed);
                }
                
                for(let i=0; i<gameBullets.length; i++) {
                    bullets3D[i].position.x = (gameBullets[i].x - window.innerWidth / 2) * 0.02;
                    bullets3D[i].position.z = (gameBullets[i].y - window.innerHeight / 2) * 0.02;
                }
            }

            renderer.render(scene, camera);
        }
        animate3D();
    }

    // 로그인 성공을 감지해서 3D 세상을 깨우기
    const loginDetectInterval = setInterval(() => {
        const loginBtn = document.getElementById('mainBtn') || document.getElementById('authBtn');
        const loginInput = document.getElementById('myId') || document.getElementById('userIdInput');
        const loginPw = document.getElementById('myPw') || document.getElementById('userPwInput');

        if (loginBtn) {
            clearInterval(loginDetectInterval);
            loginBtn.addEventListener('click', () => {
                const id = loginInput.value.trim();
                const pw = loginPw.value.trim();
                if (id && pw && (localStorage.getItem('game_user_' + id) === pw || localStorage.getItem('user_' + id) === pw)) {
                    // 로그인 장벽 통과 후 0.2초 뒤 3D 세계관 활성화!
                    setTimeout(init3DWorld, 200);
                }
            });
        }
    }, 100);

    // 창 리사이즈 대응
    window.addEventListener('resize', () => {
        if (camera && renderer) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>
<script>
    // 기존의 단순했던 3D 플레이어 상자를 멋진 로봇 그룹으로 교체하는 치트키 코드
    const upgradeCharacterInterval = setInterval(() => {
        // 앞서 만들어진 3D 무대(scene)와 플레이어 변수(pBox3D)가 준비되었는지 확인
        if (typeof scene !== 'undefined' && pBox3D) {
            clearInterval(upgradeCharacterInterval); // 찾았으면 반복 감지 종료

            // 1. 기존의 못생긴 통상자는 무대에서 완전히 제거!
            scene.remove(pBox3D);

            // 2. 여러 부품을 하나로 묶어줄 로봇 그룹(Group) 생성
            const robotCharacter = new THREE.Group();

            // 부품 A: [몸통] 세련된 다크 그레이 메탈 상자
            const bodyGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x22252a, metalness: 0.8, roughness: 0.2 });
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            bodyMesh.position.y = 0.35;
            robotCharacter.add(bodyMesh);

            // 부품 B: [머리] 주인공의 상징, 네온 블루 빛이 감도는 상자
            const headGeo = new THREE.BoxGeometry(0.5, 0.4, 0.5);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, roughness: 0.1 });
            const headMesh = new THREE.Mesh(headGeo, headMat);
            headMesh.position.y = 0.9; // 몸통 위로 올리기
            robotCharacter.add(headMesh);

            // 부품 C: [빛나는 고글/눈] 가로로 긴 네온 그린 고글
            const eyeGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc }); // 빛 효과를 위해 Basic 재질 사용
            const eyeMesh = new THREE.Mesh(eyeGeo, eyeMat);
            eyeMesh.position.set(0, 0.95, 0.21); // 머리 앞쪽에 착 붙이기
            robotCharacter.add(eyeMesh);

            // 부품 D: [제트팩] 로봇 등에 장착된 네온 핑크 원통 배낭
            const jetGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.5, 8);
            const jetMat = new THREE.MeshStandardMaterial({ color: 0xff0055, metalness: 0.5 });
            
            const leftJet = new THREE.Mesh(jetGeo, jetMat);
            leftJet.position.set(-0.25, 0.4, -0.4); // 왼쪽 등에 배치
            leftJet.rotation.x = Math.PI / 6; // 살짝 역동적인 각도
            robotCharacter.add(leftJet);

            const rightJet = new THREE.Mesh(jetGeo, jetMat);
            rightJet.position.set(0.25, 0.4, -0.4); // 오른쪽 등에 배치
            rightJet.rotation.x = Math.PI / 6;
            robotCharacter.add(rightJet);

            // 3. 새로 만든 간지 폭발 로봇을 무대에 추가!
            scene.add(robotCharacter);

            // 4. 기존 2D 좌표 동기화 루프의 대상을 이 새 로봇으로 가로채기!
            // 매 프레임 도는 애니메이션 내부에서 robotCharacter를 제어하도록 덮어씁니다.
            const 원래애니메이션 = requestAnimationFrame;
            
            // 기존 플레이어 변수 자체를 우리가 만든 로봇 그룹으로 바꿔치기해서 기존 코드랑 호환시킴
            pBox3D = robotCharacter;
            
            console.log("Cretyz 전용 '네온 전투 로봇' 캐릭터 스킨 적용 완료!");
        }
    }, 200);
</script>
<script>
    const fixCharacterInterval = setInterval(() => {
        // 기존 2D 플레이어(pChar) 오브젝트가 있는지 확인
        if (typeof pChar !== 'undefined') {
            clearInterval(fixCharacterInterval);

            // 1. 2D 초록색 원을 완전히 투명하게 만들어서 숨기기!
            pChar.color = 'rgba(0, 0, 0, 0)'; 

            // 2. 3D 로봇이 화면 한가운데서 시작하도록 2D 기본 위치를 화면 중앙으로 강제 세팅
            pChar.x = window.innerWidth / 2;
            pChar.y = window.innerHeight / 2;

            console.log("초록색 2D 원 숨기기 및 3D 로봇 중심점 정렬 완료!");
        }
    }, 200);
</script>
