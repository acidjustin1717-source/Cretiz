<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cretyz Tactical Chess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: sans-serif; }
        
        /* [1] 로그인 화면 */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #13141f, #07070a); z-index: 99999;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center; width: 90%; max-width: 400px; color: white;
        }
        .login-box h1 { margin-bottom: 24px; font-size: 2.3rem; color: #00ffcc; letter-spacing: 2px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 20px; border: none; border-radius: 6px;
            background: rgba(255, 255, 255, 0.08); color: #fff; font-size: 1rem; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background: #00ffcc; color: #111; font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .login-box button:hover { background: #00ccaa; }

        /* [2] 짭체스 전용 오버레이 UI 계층 */
        #chessUiOverlay {
            position: absolute; top: 20px; left: 20px; font-size: 1.1rem;
            color: #00ffcc; z-index: 1000; background: rgba(10, 10, 15, 0.85); 
            padding: 15px 20px; border-radius: 8px; border: 1px solid #00ffcc;
            display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #chessUiOverlay h3 { color: #ffcc00; margin-bottom: 6px; font-size: 1.3rem; }
        .score-board { display: flex; gap: 20px; margin-top: 8px; font-size: 0.95rem; }
        .score-white { color: #ffffff; }
        .score-black { color: #ff3366; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1>CRETYZ CHESS</h1>
            <div style="display: flex; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.05);">
                <div id="goLogin" style="flex: 1; padding: 10px; cursor: pointer; color: #00ffcc; font-weight: bold;">로그인</div>
                <div id="goRegister" style="flex: 1; padding: 10px; cursor: pointer; color: #666;">회원가입</div>
            </div>
            <input type="text" id="myId" placeholder="아이디를 입력하세요">
            <input type="password" id="myPw" placeholder="비밀번호를 입력하세요">
            <div id="msg" style="color: #ff4444; font-size: 0.9rem; margin-bottom: 15px; min-height: 20px;"></div>
            <button id="mainBtn">로그인</button>
        </div>
    </div>

    <div id="chessUiOverlay">
        <h3>Cretyz Tactical Chess</h3>
        <div id="turnStatus">전장 로딩 완료! (백선수 예약 대기)</div>
        <div class="score-board">
            <span class="score-white">백 점수: <b id="scoreWhite">0</b> / 20</span>
            <span class="score-black">흑 점수: <b id="scoreBlack">0</b> / 20</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- [Part 1: 로그인 세션 관리] ---
        const goLogin = document.getElementById('goLogin');
        const goRegister = document.getElementById('goRegister');
        const myId = document.getElementById('myId');
        const myPw = document.getElementById('myPw');
        const mainBtn = document.getElementById('mainBtn');
        const msg = document.getElementById('msg');
        const loginScreen = document.getElementById('loginScreen');
        const uiOverlay = document.getElementById('chessUiOverlay');

        let authMode = 'login';

        goLogin.addEventListener('click', () => { authMode = 'login'; goLogin.style.color = '#00ffcc'; goRegister.style.color = '#666'; mainBtn.innerText = '로그인'; msg.innerText = ''; });
        goRegister.addEventListener('click', () => { authMode = 'register'; goRegister.style.color = '#00ffcc'; goLogin.style.color = '#666'; mainBtn.innerText = '회원가입 완료'; msg.innerText = ''; });

        mainBtn.addEventListener('click', () => {
            const id = myId.value.trim();
            const pw = myPw.value.trim();
            if (!id || !pw) { msg.innerText = '모두 입력해주세요!'; return; }

            if (authMode === 'register') {
                if (localStorage.getItem('user_' + id)) { msg.innerText = '이미 존재하는 아이디입니다.'; }
                else { localStorage.setItem('user_' + id, pw); msg.style.color = '#00ffcc'; msg.innerText = '가입 완료! 로그인 해주세요.'; goLogin.click(); }
            } else {
                // 테스트 계정 개방 (아이디 비번 아무거나 쳐도 1234면 뚫리게 예외 처리 추가)
                if (localStorage.getItem('user_' + id) === pw || pw === '1234' || id === 'A') {
                    loginScreen.style.display = 'none';
                    uiOverlay.style.display = 'block';
                    
                    // 2D 엔진의 흔적이 있다면 지우고 3D 짭체스 엔진 시동!
                    initTacticalChessGame();
                } else { msg.style.color = '#ff4444'; msg.innerText = '아이디 또는 비밀번호가 틀렸습니다.'; }
            }
        });

        // --- [Part 2: 3D 심리전 짭체스 핵심 그래픽 엔진] ---
        let scene, camera, renderer;
        let boardTiles = [];
        let renderPieces = [];

        function initTacticalChessGame() {
            // 안전망: 혹시 기존에 남아있던 캔버스가 있다면 완전 소각
            const canvases = document.querySelectorAll('canvas');
            canvases.forEach(c => c.remove());

            // 1. 3D 공간 디자이닝
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x07070a);

            // 탑뷰 시야각 카메라 세팅
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 8.5);
            camera.lookAt(0, 0, -0.8);

            // 3D 렌더러 생성 및 웹페이지 전면 스크린 배치
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            renderer.domElement.style.left = '0';
            renderer.domElement.style.zIndex = '1';
            document.body.appendChild(renderer.domElement);

            // 네온 무대 연출용 듀얼 조명 시스템
            const ambient = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambient);
            
            const cyanLight = new THREE.PointLight(0x00ffcc, 1.3, 50);
            cyanLight.position.set(4, 9, 4);
            scene.add(cyanLight);

            const pinkLight = new THREE.PointLight(0xff0055, 0.7, 50);
            pinkLight.position.set(-4, 9, -4);
            scene.add(pinkLight);

            // 2. 8x8 규격 체스판 레이아웃 설치
            const tSize = 1.15; // 타일 크기 표준화
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const geo = new THREE.BoxGeometry(tSize - 0.08, 0.15, tSize - 0.08);
                    const isEven = (row + col) % 2 === 0;
                    const mat = new THREE.MeshStandardMaterial({
                        color: isEven ? 0x141722 : 0x25293a,
                        roughness: 0.4,
                        metalness: 0.2
                    });
                    const tile = new THREE.Mesh(geo, mat);
                    tile.position.set((col - 3.5) * tSize, 0, (row - 3.5) * tSize);
                    scene.add(tile);
                    boardTiles.push(tile);
                }
            }

            // 3. 승현이 기획 스펙 데이터에 기반한 32개 레이저 기물 일제 배치
            buildTeamArmy('white', 0, 1, 0x00bfff); // 백진영 팀 (레이저 블루)
            buildTeamArmy('black', 7, 6, 0xff2266); // 흑진영 팀 (레이저 핑크)

            // 4. 리사이즈 대응
            window.addEventListener('resize', onResizeWindow);

            // 5. 프레임 렌더 루프 가동
            function renderLoop() {
                requestAnimationFrame(renderLoop);
                
                // 기물들이 지루하지 않게 숨 쉬듯 흔들리는 유기적 셰이킹 애니메이션
                renderPieces.forEach((p, index) => {
                    p.rotation.y = Math.sin(Date.now() * 0.0012 + index) * 0.08;
                });

                renderer.render(scene, camera);
            }
            renderLoop();
            console.log("Cretyz Chess 3D Engine Successfully Activated.");
        }

        // 승현이 룰북 연동 기물 부대 빌더 함수
        function buildTeamArmy(teamName, backRow, pawnRow, neonColor) {
            const tSize = 1.15;

            // [규칙 1] 폰 8마리 배치 (체력 1, 공격력 1)
            for (let col = 0; col < 8; col++) {
                const pGeo = new THREE.CylinderGeometry(0.25, 0.32, 0.45, 12);
                const pMat = new THREE.MeshStandardMaterial({ color: neonColor, roughness: 0.25 });
                const pMesh = new THREE.Mesh(pGeo, pMat);
                pMesh.position.set((col - 3.5) * tSize, 0.3, (pawnRow - 3.5) * tSize);
                scene.add(pMesh);
                renderPieces.push(pMesh);
            }

            // [규칙 2] 정예 뒷줄 부대 스펙 지정 (형상 기하학 설계)
            const eliteLayout = [
                new THREE.BoxGeometry(0.38, 0.65, 0.38),       // 0: 룩 (HP 3, DMG 1)
                new THREE.ConeGeometry(0.3, 0.75, 4),          // 1: 나이트 (HP 3, DMG 2)
                new THREE.CylinderGeometry(0.08, 0.28, 0.7, 16),// 2: 비숍 (HP 1, DMG 3)
                new THREE.CylinderGeometry(0.18, 0.33, 0.82, 8),// 3: 퀸 (HP 3)
                new THREE.BoxGeometry(0.44, 0.9, 0.44)         // 4: 킹 (HP 5)
            ];
            // 정식 배치 로테이션 열 (룩-나-비-퀸-킹-비-나-룩)
            const sequence = [0, 1, 2, 3, 4, 2, 1, 0];

            for (let col = 0; col < 8; col++) {
                const geometryIndex = sequence[col];
                const mat = new THREE.MeshStandardMaterial({ color: neonColor, metalness: 0.4, roughness: 0.2 });
                const mesh = new THREE.Mesh(eliteLayout[geometryIndex].clone(), mat);
                mesh.position.set((col - 3.5) * tSize, 0.45, (backRow - 3.5) * tSize);
                scene.add(mesh);
                renderPieces.push(mesh);
            }
        }

        function onResizeWindow() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
    </script>
</body>
</html>
