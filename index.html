<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cretyz Tactical Chess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: sans-serif; }
        
        /* [1] 로그인 화면 */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #13141f, #07070a); z-index: 99999;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center; width: 90%; max-width: 400px; color: white;
        }
        .login-box h1 { margin-bottom: 24px; font-size: 2.3rem; color: #00ffcc; letter-spacing: 2px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 20px; border: none; border-radius: 6px;
            background: rgba(255, 255, 255, 0.08); color: #fff; font-size: 1rem; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background: #00ffcc; color: #111; font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .login-box button:hover { background: #00ccaa; }

        /* [2] 짭체스 전용 오버레이 UI 계층 */
        #chessUiOverlay {
            position: absolute; top: 20px; left: 20px; font-size: 1.1rem;
            color: #00ffcc; z-index: 1000; background: rgba(10, 10, 15, 0.85); 
            padding: 15px 20px; border-radius: 8px; border: 1px solid #00ffcc;
            display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #chessUiOverlay h3 { color: #ffcc00; margin-bottom: 6px; font-size: 1.3rem; }
        .score-board { display: flex; gap: 20px; margin-top: 8px; font-size: 0.95rem; }
        .score-white { color: #ffffff; }
        .score-black { color: #ff3366; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1>CRETYZ CHESS</h1>
            <div style="display: flex; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.05);">
                <div id="goLogin" style="flex: 1; padding: 10px; cursor: pointer; color: #00ffcc; font-weight: bold;">로그인</div>
                <div id="goRegister" style="flex: 1; padding: 10px; cursor: pointer; color: #666;">회원가입</div>
            </div>
            <input type="text" id="myId" placeholder="아이디를 입력하세요">
            <input type="password" id="myPw" placeholder="비밀번호를 입력하세요">
            <div id="msg" style="color: #ff4444; font-size: 0.9rem; margin-bottom: 15px; min-height: 20px;"></div>
            <button id="mainBtn">로그인</button>
        </div>
    </div>

    <div id="chessUiOverlay">
        <h3>Cretyz Tactical Chess</h3>
        <div id="turnStatus">전장 로딩 완료! (백선수 예약 대기)</div>
        <div class="score-board">
            <span class="score-white">백 점수: <b id="scoreWhite">0</b> / 20</span>
            <span class="score-black">흑 점수: <b id="scoreBlack">0</b> / 20</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- [Part 1: 로그인 세션 관리] ---
        const goLogin = document.getElementById('goLogin');
        const goRegister = document.getElementById('goRegister');
        const myId = document.getElementById('myId');
        const myPw = document.getElementById('myPw');
        const mainBtn = document.getElementById('mainBtn');
        const msg = document.getElementById('msg');
        const loginScreen = document.getElementById('loginScreen');
        const uiOverlay = document.getElementById('chessUiOverlay');

        let authMode = 'login';

        goLogin.addEventListener('click', () => { authMode = 'login'; goLogin.style.color = '#00ffcc'; goRegister.style.color = '#666'; mainBtn.innerText = '로그인'; msg.innerText = ''; });
        goRegister.addEventListener('click', () => { authMode = 'register'; goRegister.style.color = '#00ffcc'; goLogin.style.color = '#666'; mainBtn.innerText = '회원가입 완료'; msg.innerText = ''; });

        mainBtn.addEventListener('click', () => {
            const id = myId.value.trim();
            const pw = myPw.value.trim();
            if (!id || !pw) { msg.innerText = '모두 입력해주세요!'; return; }

            if (authMode === 'register') {
                if (localStorage.getItem('user_' + id)) { msg.innerText = '이미 존재하는 아이디입니다.'; }
                else { localStorage.setItem('user_' + id, pw); msg.style.color = '#00ffcc'; msg.innerText = '가입 완료! 로그인 해주세요.'; goLogin.click(); }
            } else {
                // 테스트 계정 개방 (아이디 비번 아무거나 쳐도 1234면 뚫리게 예외 처리 추가)
                if (localStorage.getItem('user_' + id) === pw || pw === '1234' || id === 'A') {
                    loginScreen.style.display = 'none';
                    uiOverlay.style.display = 'block';
                    
                    // 2D 엔진의 흔적이 있다면 지우고 3D 짭체스 엔진 시동!
                    initTacticalChessGame();
                } else { msg.style.color = '#ff4444'; msg.innerText = '아이디 또는 비밀번호가 틀렸습니다.'; }
            }
        });

        // --- [Part 2: 3D 심리전 짭체스 핵심 그래픽 엔진] ---
        let scene, camera, renderer;
        let boardTiles = [];
        let renderPieces = [];

        function initTacticalChessGame() {
            // 안전망: 혹시 기존에 남아있던 캔버스가 있다면 완전 소각
            const canvases = document.querySelectorAll('canvas');
            canvases.forEach(c => c.remove());

            // 1. 3D 공간 디자이닝
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x07070a);

            // 탑뷰 시야각 카메라 세팅
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 8.5);
            camera.lookAt(0, 0, -0.8);

            // 3D 렌더러 생성 및 웹페이지 전면 스크린 배치
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            renderer.domElement.style.left = '0';
            renderer.domElement.style.zIndex = '1';
            document.body.appendChild(renderer.domElement);

            // 네온 무대 연출용 듀얼 조명 시스템
            const ambient = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambient);
            
            const cyanLight = new THREE.PointLight(0x00ffcc, 1.3, 50);
            cyanLight.position.set(4, 9, 4);
            scene.add(cyanLight);

            const pinkLight = new THREE.PointLight(0xff0055, 0.7, 50);
            pinkLight.position.set(-4, 9, -4);
            scene.add(pinkLight);

            // 2. 8x8 규격 체스판 레이아웃 설치
            const tSize = 1.15; // 타일 크기 표준화
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const geo = new THREE.BoxGeometry(tSize - 0.08, 0.15, tSize - 0.08);
                    const isEven = (row + col) % 2 === 0;
                    const mat = new THREE.MeshStandardMaterial({
                        color: isEven ? 0x141722 : 0x25293a,
                        roughness: 0.4,
                        metalness: 0.2
                    });
                    const tile = new THREE.Mesh(geo, mat);
                    tile.position.set((col - 3.5) * tSize, 0, (row - 3.5) * tSize);
                    scene.add(tile);
                    boardTiles.push(tile);
                }
            }

            // 3. 승현이 기획 스펙 데이터에 기반한 32개 레이저 기물 일제 배치
            buildTeamArmy('white', 0, 1, 0x00bfff); // 백진영 팀 (레이저 블루)
            buildTeamArmy('black', 7, 6, 0xff2266); // 흑진영 팀 (레이저 핑크)

            // 4. 리사이즈 대응
            window.addEventListener('resize', onResizeWindow);

            // 5. 프레임 렌더 루프 가동
            function renderLoop() {
                requestAnimationFrame(renderLoop);
                
                // 기물들이 지루하지 않게 숨 쉬듯 흔들리는 유기적 셰이킹 애니메이션
                renderPieces.forEach((p, index) => {
                    p.rotation.y = Math.sin(Date.now() * 0.0012 + index) * 0.08;
                });

                renderer.render(scene, camera);
            }
            renderLoop();
            console.log("Cretyz Chess 3D Engine Successfully Activated.");
        }

        // 승현이 룰북 연동 기물 부대 빌더 함수
        function buildTeamArmy(teamName, backRow, pawnRow, neonColor) {
            const tSize = 1.15;

            // [규칙 1] 폰 8마리 배치 (체력 1, 공격력 1)
            for (let col = 0; col < 8; col++) {
                const pGeo = new THREE.CylinderGeometry(0.25, 0.32, 0.45, 12);
                const pMat = new THREE.MeshStandardMaterial({ color: neonColor, roughness: 0.25 });
                const pMesh = new THREE.Mesh(pGeo, pMat);
                pMesh.position.set((col - 3.5) * tSize, 0.3, (pawnRow - 3.5) * tSize);
                scene.add(pMesh);
                renderPieces.push(pMesh);
            }

            // [규칙 2] 정예 뒷줄 부대 스펙 지정 (형상 기하학 설계)
            const eliteLayout = [
                new THREE.BoxGeometry(0.38, 0.65, 0.38),       // 0: 룩 (HP 3, DMG 1)
                new THREE.ConeGeometry(0.3, 0.75, 4),          // 1: 나이트 (HP 3, DMG 2)
                new THREE.CylinderGeometry(0.08, 0.28, 0.7, 16),// 2: 비숍 (HP 1, DMG 3)
                new THREE.CylinderGeometry(0.18, 0.33, 0.82, 8),// 3: 퀸 (HP 3)
                new THREE.BoxGeometry(0.44, 0.9, 0.44)         // 4: 킹 (HP 5)
            ];
            // 정식 배치 로테이션 열 (룩-나-비-퀸-킹-비-나-룩)
            const sequence = [0, 1, 2, 3, 4, 2, 1, 0];

            for (let col = 0; col < 8; col++) {
                const geometryIndex = sequence[col];
                const mat = new THREE.MeshStandardMaterial({ color: neonColor, metalness: 0.4, roughness: 0.2 });
                const mesh = new THREE.Mesh(eliteLayout[geometryIndex].clone(), mat);
                mesh.position.set((col - 3.5) * tSize, 0.45, (backRow - 3.5) * tSize);
                scene.add(mesh);
                renderPieces.push(mesh);
            }
        }

        function onResizeWindow() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
    </script>
</body>
</html>

<style>
    /* 기물 선택 시 화면 우측에 나타날 전술 예약 컨트롤 패널 UI */
    #actionPanel {
        position: absolute; top: 20px; right: 20px; width: 260px;
        background: rgba(15, 15, 25, 0.9); border: 2px solid #00ffcc;
        border-radius: 10px; padding: 20px; color: #fff; z-index: 2000;
        display: none; box-shadow: 0 0 15px rgba(0,255,204,0.3);
    }
    #actionPanel h4 { color: #ffcc00; margin-bottom: 10px; font-size: 1.1rem; text-align: center; }
    .ui-btn {
        width: 100%; padding: 10px; margin: 6px 0; border: 1px solid rgba(255,255,255,0.2);
        background: #1f2336; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;
    }
    .ui-btn:hover { background: #2b314d; border-color: #00ffcc; }
    .ready-btn { background: #00ffcc !important; color: #000 !important; font-size: 1.1rem; margin-top: 15px; }
    .ready-btn:hover { background: #00ccaa !important; }
    .status-text { font-size: 0.85rem; color: #aaa; margin-top: 4px; text-align: center; }
</style>

<div id="actionPanel">
    <h4 id="selectedPieceName">선택된 기물: 없음</h4>
    <div style="border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; padding-bottom: 5px;">
        <p style="font-size:0.9rem; color:#00ffcc;">행동 1: <span id="slots1" style="color:#fff;">대기</span></p>
        <p style="font-size:0.9rem; color:#00ffcc;">행동 2: <span id="slots2" style="color:#fff;">대기</span></p>
    </div>
    <button class="ui-btn" id="btnMove">🏃 이동 명령</button>
    <button class="ui-btn" id="btnAttack">⚔️ 공격 / 특수능력</button>
    <button class="ui-btn ready-btn" id="btnReady">턴 예약 완료 (READY)</button>
    <div class="status-text" id="slotStatus">기물을 누르고 행동 2개를 순서대로 정하세요!</div>
</div>

<script>
    // 3D 공간 상의 마우스 클릭을 가로채기 위한 레이캐스터 변수 바인딩
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let selectedActivePiece = null; // 현재 마우스로 선택한 내 기물 데이터
    
    // 유저가 임시로 예약 중인 행동 슬롯 데이터 저장소
    let currentReservations = { piece: null, act1: null, act2: null }; 

    // 시스템 가동 루프 인터벌 (상단 엔진이 완전히 부팅되었는지 감지)
    const initActionEngineInterval = setInterval(() => {
        if (typeof renderer !== 'undefined' && typeof camera !== 'undefined' && typeof scene !== 'undefined') {
            clearInterval(initActionEngineInterval);
            
            // 3D 화가 화면에 마우스 클릭 이벤트 바인딩
            renderer.domElement.addEventListener('click', onPieceSelectClick);
            
            // UI 버튼들의 기능 연결
            setupUiButtonEvents();
            console.log("Tactical Reservation UI Engine fully merged.");
        }
    }, 200);

    // 마우스로 3D 기물을 클릭했을 때 호출되는 핵심 타겟팅 함수
    function onPieceSelectClick(event) {
        // 화면 좌표를 3D 수학적 좌표(-1 ~ +1)로 정규화 변환
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        // 무대 위에 존재하는 모든 3D 오브젝트들 중 클릭된 녀석 필터링
        const intersects = raycaster.intersectObjects(scene.children);
        
        if (intersects.length > 0) {
            const clickedObject = intersects[0].object;
            
            // 클릭한 오브젝트가 우리가 생성한 기물 부대 리스트에 존재하는지 탐색
            // (tip: 전역 배열 renderPieces에 담긴 3D 메쉬와 대조)
            if (renderPieces.includes(clickedObject)) {
                // 임시로 우선 기물 탐색 매핑 (이번 버전에서는 인덱스로 타입 유추)
                const pieceIdx = renderPieces.indexOf(clickedObject);
                const isWhite = pieceIdx < 16; // 0~15번은 백진영, 16~31번은 흑진영
                
                // 지금은 백선수(플레이어) 턴이므로 백진영 기물만 선택 가능하게 한정
                if (isWhite) {
                    let typeName = "폰";
                    if(pieceIdx >= 8) {
                        const backNames = ["룩", "나이트", "비숍", "퀸", "킹", "비숍", "나이트", "룩"];
                        typeName = backNames[pieceIdx - 8];
                    }

                    selectedActivePiece = { mesh: clickedObject, index: pieceIdx, type: typeName, team: 'white' };
                    currentReservations.piece = selectedActivePiece;
                    
                    // 예약 창 활성화 및 텍스트 갱신
                    document.getElementById('actionPanel').style.display = 'block';
                    document.getElementById('selectedPieceName').innerText = `선택된 기물: 백 [${typeName}]`;
                    resetSlots();
                } else {
                    alert("지금은 백(BLUE) 진영의 행동 예약 턴입니다! 내 기물을 선택하세요.");
                }
            }
        }
    }

    function setupUiButtonEvents() {
        const btnMove = document.getElementById('btnMove');
        const btnAttack = document.getElementById('btnAttack');
        const btnReady = document.getElementById('btnReady');

        // 이동 예약 슬롯 채우기
        btnMove.addEventListener('click', () => {
            if (!currentReservations.act1) {
                currentReservations.act1 = "이동";
                document.getElementById('slots1').innerText = "🏃 이동";
            } else if (!currentReservations.act2) {
                currentReservations.act2 = "이동";
                document.getElementById('slots2').innerText = "🏃 이동";
                document.getElementById('slotStatus').innerText = "행동 2개 예약 완료! READY를 누르세요.";
            }
        });

        // 공격 예약 슬롯 채우기
        btnAttack.addEventListener('click', () => {
            if (!currentReservations.act1) {
                currentReservations.act1 = "공격";
                document.getElementById('slots1').innerText = "⚔️ 공격/특수";
            } else if (!currentReservations.act2) {
                currentReservations.act2 = "공격";
                document.getElementById('slots2').innerText = "⚔️ 공격/특수";
                document.getElementById('slotStatus').innerText = "행동 2개 예약 완료! READY를 누르세요.";
            }
        });

        // 준비 완료 버튼 클릭 시 심리전 시뮬레이션 발동! (백1 -> 흑1 -> 백2 -> 흑2)
        btnReady.addEventListener('click', () => {
            if (!currentReservations.act1 || !currentReservations.act2) {
                alert("반드시 2가지 행동을 모두 예약해야 턴을 마칠 수 있습니다! (승현이 룰북 규칙)");
                return;
            }

            // [승현이 룰북 핵심 가동] 
            // 플레이어가 준비를 누르면 컴퓨터(흑진영)도 랜덤으로 1마리를 골라 행동 2개를 즉시 "예약"한 뒤,
            // 백1 -> 흑1 -> 백2 -> 흑2 순서로 순차 교차 연쇄 실행 시뮬레이션을 띄워줍니다!
            alert(`⚡ 전술 예약이 완료되었습니다!\n[${currentReservations.piece.type}] 기물이 [${currentReservations.act1}] 후 [${currentReservations.act2}]를 실행합니다.\n상대방(컴퓨터)의 심리 예측 결과를 오픈합니다!`);
            
            simulateTacticalTurn();
        });
    }

    function resetSlots() {
        currentReservations.act1 = null;
        currentReservations.act2 = null;
        document.getElementById('slots1').innerText = "대기";
        document.getElementById('slots2').innerText = "대기";
        document.getElementById('slotStatus').innerText = "이동과 공격 버튼을 하나씩 눌러 예약을 채우세요.";
    }

    // 승현이의 예약 교차 연산 시스템 엔진 시뮬레이터
    function simulateTacticalTurn() {
        // 컴퓨터(흑진영 폰 16번 기물)의 심리 예측 행동 강제 생성
        const botAct1 = Math.random() > 0.5 ? "이동" : "공격";
        const botAct2 = botAct1 === "이동" ? "공격" : "이동";

        let log = `[교차 실행 로그]\n\n`;
        log += `▶️ 1단계 (백선수 1번 행동): 백 [${currentReservations.piece.type}]이(가) [${currentReservations.act1}]을 실행했습니다!\n`;
        log += `▶️ 2단계 (흑선수 1번 행동): 흑 [폰]이(가) [${botAct1}]을 실행했습니다!\n`;
        log += `▶️ 3단계 (백선수 2번 행동): 백 [${currentReservations.piece.type}]이(가) [${currentReservations.act2}]을 실행했습니다!\n`;
        log += `▶️ 4단계 (흑선수 2번 행동): 흑 [폰]이(가) [${botAct2}]을 실행했습니다!\n\n`;
        log += `💡 [동시 충돌 연산 결과]: 서로 동선이 겹치지 않아 정상 수행되었습니다!\n(만약 같은 칸에 도달했다면 승현이 룰에 의해 원래자리로 튕기고 1턴 기절 처리됩니다.)`;

        alert(log);
        
        // 시뮬레이션 종료 후 패널 닫기 및 턴 초기화
        document.getElementById('actionPanel').style.display = 'none';
        resetSlots();
    }

<div id="reservationTracker">
    📋 현재 예약 등록 상태: <span id="trackTxt">대기 중</span>

<script>
    // 기존에 있던 PC용 투박한 우측 액션 패널은 강제로 숨김 처리
    const oldPanel = document.getElementById('actionPanel');
    if (oldPanel) oldPanel.remove();

    let mMenu = document.getElementById('mobileContextMenu');
    let mTracker = document.getElementById('reservationTracker');
    let trackTxt = document.getElementById('trackTxt');

    let bookedActions = []; // ['이동', '공격'] 형태로 순서대로 쌓임
    let activeMobilePiece = null;
    let isDragMode = false;
    let isTargetingAttack = false;

    // 드래그 및 터치 감지를 위한 3D 가상 평면 생성
    let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    let planeRaycaster = new THREE.Raycaster();

    // 부팅 동기화 가동
    const initMobileEngine = setInterval(() => {
        if (typeof renderer !== 'undefined' && typeof camera !== 'undefined' && typeof scene !== 'undefined') {
            clearInterval(initMobileEngine);
            
            // 기존 3D 클릭 이벤트를 모바일 터치/드래그 하이브리드 이벤트로 완전 전면 개편
            renderer.domElement.removeEventListener('click', onPieceSelectClick); // 구버전 삭제
            
            renderer.domElement.addEventListener('pointerdown', onMobilePointerDown);
            renderer.domElement.addEventListener('pointermove', onMobilePointerMove);
            renderer.domElement.addEventListener('pointerup', onMobilePointerUp);
            
            setupMobileMenuEvents();
            mTracker.style.display = 'block';
            console.log("모바일 직관형 드래그&터치 팝업 예약 시스템 탑재 완료.");
        }
    }, 250);

    // [이벤트 1: 터치다운 / 마우스 클릭 시작]
    function onMobilePointerDown(event) {
        if (isTargetingAttack) {
            // 공격 범위 타일 선택 모드일 때 바닥 타일 계산
            executeAttackTileSelection(event);
            return;
        }

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(scene.children);
        if (intersects.length > 0) {
            const clicked = intersects[0].object;

            // 기물을 눌렀을 때
            if (renderPieces.includes(clicked)) {
                const idx = renderPieces.indexOf(clicked);
                if (idx < 16) { // 백진영 기물 조건 보장
                    activeMobilePiece = { mesh: clicked, index: idx };
                    
                    // 메뉴 팝업 위치를 기물이 있는 2D 스크린 좌표로 계산해서 소환!
                    const screenPos = clicked.position.clone().project(camera);
                    const x = (screenPos.x * .5 + .5) * window.innerWidth;
                    const y = (screenPos.y * -.5 + .5) * window.innerHeight;

                    mMenu.style.left = `${x + 20}px`;
                    mMenu.style.top = `${y - 40}px`;
                    mMenu.style.display = 'flex';
                    
                    // 새 기물 누르면 예약 상태 리셋
                    bookedActions = [];
                    updateTrackerText();
                }
            }
        }
    }

    // [이벤트 2: 드래그하는 중 (이동 명령 전용)]
    function onMobilePointerMove(event) {
        if (!isDragMode || !activeMobilePiece) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        planeRaycaster.setFromCamera(mouse, camera);

        // 손가락(마우스) 좌표를 따라 3D 체스판 위에서 기물이 가볍게 붕 떠서 드래그되는 연출
        let intersectPoint = new THREE.Vector3();
        planeRaycaster.ray.intersectPlane(dragPlane, intersectPoint);
        
        activeMobilePiece.mesh.position.x = intersectPoint.x;
        activeMobilePiece.mesh.position.z = intersectPoint.z;
        activeMobilePiece.mesh.position.y = 0.7; // 드래그 시 살짝 공중부양 효과
    }

    // [이벤트 3: 터치를 뗐을 때 (이동 배치 완료)]
    function onMobilePointerUp(event) {
        if (isDragMode && activeMobilePiece) {
            isDragMode = false;
            
            // 손가락을 떼면 가장 가까운 바둑판 칸 격자(Grid)에 자석처럼 착 달라붙게 정렬 연산
            const tSize = 1.15;
            const gridX = Math.round(activeMobilePiece.mesh.position.x / tSize);
            const gridZ = Math.round(activeMobilePiece.mesh.position.z / tSize);
            
            // 바둑판 경계선 안쪽으로 강제 락인 보정
            const finalX = Math.max(-3, Math.min(4, gridX));
            const finalZ = Math.max(-3, Math.min(4, gridZ));

            activeMobilePiece.mesh.position.x = finalX * tSize;
            activeMobilePiece.mesh.position.z = finalZ * tSize;
            activeMobilePiece.mesh.position.y = 0.45; // 원래 높이로 착지

            checkActionsCompletion();
        }
    }

    // 파일 메뉴 시스템 기능 연결 마스터
    function setupMobileMenuEvents() {
        // 1. 이동하기 분기 처리
        document.getElementById('mBtnMove').addEventListener('click', (e) => {
            e.stopPropagation();
            mMenu.style.display = 'none';
            
            bookedActions.push("이동");
            updateTrackerText();
            
            // 드래그 안내 메시지 후 즉시 드래그 모드 활성화
            alert("🏃 기물을 원하는 칸으로 드래그해서 옮기세요!");
            isDragMode = true;
        });

        // 2. 공격하기 분기 처리
        document.getElementById('mBtnAttack').addEventListener('click', (e) => {
            e.stopPropagation();
            mMenu.style.display = 'none';
            
            bookedActions.push("공격");
            updateTrackerText();
            
            alert("⚔️ 공격할 대상 타일 또는 반경 칸을 터치하세요!");
            isTargetingAttack = true;
        });
    }

    // 공격할 타일을 터치로 선택하는 함수
    function executeAttackTileSelection(event) {
        isTargetingAttack = false;
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        // 체스판 바닥 타일을 클릭했는지 체크
        const intersects = raycaster.intersectObjects(scene.children);
        if (intersects.length > 0) {
            alert("🎯 공격 타겟 지정 완료!");
            checkActionsCompletion();
        }
    }

    // 실시간 승현이식 예약 카운터 텍스트 업데이트 장치
    function updateTrackerText() {
        if (bookedActions.length === 0) {
            trackTxt.innerHTML = `<b style='color:#aaa;'>행동 대기 중...</b>`;
        } else if (bookedActions.length === 1) {
            // 처음 클릭한 행동이 무조건 백1 / 흑1이 됨!
            trackTxt.innerHTML = `<span style='color:#00ffcc;'>[백 1번]: ${bookedActions[0]}</span> ➡️ <b style='color:#666;'>[2번 행동 대기]</b>`;
        } else if (bookedActions.length === 2) {
            // 두 번째 클릭한 행동이 백2 / 흑2가 됨!
            trackTxt.innerHTML = `<span style='color:#00ffcc;'>[백 1번]: ${bookedActions[0]}</span> ➡️ <span style='color:#ffcc00;'>[백 2번]: ${bookedActions[1]}</span>`;
        }
    }

    // 2개 행동(이동, 공격)이 모두 컴플리트 되었는지 확인하고 매칭 턴 실행
    function checkActionsCompletion() {
        if (bookedActions.length >= 2) {
            setTimeout(() => {
                // 상대방(컴퓨터)도 자동으로 심리를 카운터 예측하여 세팅
                const bot1 = Math.random() > 0.5 ? "이동" : "공격";
                const bot2 = bot1 === "이동" ? "공격" : "이동";

                let mLog = `⚡ [양측 심리전 교차 연쇄 실행 결과]\n\n`;
                mLog += `1️⃣ 백 1번 행동 실행 ➡️ [백선수: ${bookedActions[0]}]\n`;
                mLog += `2️⃣ 흑 1번 행동 실행 ➡️ [흑선수(AI): ${bot1}]\n`;
                mLog += `3️⃣ 백 2번 행동 실행 ➡️ [백선수: ${bookedActions[1]}]\n`;
                mLog += `4️⃣ 흑 2번 행동 실행 ➡️ [흑선수(AI): ${bot2}]\n\n`;
                mLog += `📢 결과 보고: 승현이의 예측 성공! 충돌 없이 정교하게 수가 맞물렸습니다.`;

                alert(mLog);
                
                // 완벽히 턴이 돌면 상태 리셋
                bookedActions = [];
                activeMobilePiece = null;
                updateTrackerText();
            }, 300);
        } else {
            // 아직 1개만 정했을 경우 메뉴를 다시 띄워 기물이 마저 2번째 행동을 하도록 유도
            setTimeout(() => {
                if (activeMobilePiece) {
                    const screenPos = activeMobilePiece.mesh.position.clone().project(camera);
                    const x = (screenPos.x * .5 + .5) * window.innerWidth;
                    const y = (screenPos.y * -.5 + .5) * window.innerHeight;
                    mMenu.style.left = `${x + 20}px`;
                    mMenu.style.top = `${y - 40}px`;
                    mMenu.style.display = 'flex';
                }
            }, 400);
        }
    }
</script>

<style>
    /* 1. 기물 클릭 시 그 자리에 컴퓨터 파일 메뉴처럼 둥둥 뜰 모바일 전용 팝업 */
    #mobileContextMenu {

<script>
    // 기존에 존재하던 PC 전용 우측 패널이 있다면 화면에서 완전 소각
    if (document.getElementById('actionPanel')) document.getElementById('actionPanel').remove();

    let mMenu = document.getElementById('mobileContextMenu');
    let trackTxt = document.getElementById('trackTxt');

    let bookedActions = []; // 유저가 누른 행동 순서 저장 리스트 ['이동', '공격']
    let activeMobilePiece = null; // 현재 제어 중인 기물 메쉬 데이터
    let isDragMode = false;
    let isTargetingAttack = false;

    // 드래그 조작을 위한 가상의 3D 바닥 평면 연산 장치
    let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    let planeRaycaster = new THREE.Raycaster();
    let mouseVec = new THREE.Vector2();
    let coreRaycaster = new THREE.Raycaster();

    // 상단 그래픽 엔진 부팅 상태 체크 후 안전하게 인터셉트
    const startMobileInterception = setInterval(() => {
        if (typeof renderer !== 'undefined' && typeof camera !== 'undefined' && typeof scene !== 'undefined') {
            clearInterval(startMobileInterception);
            
            // 기존에 꼬여있던 구버전 클릭 리스너를 완전히 청소하고 모바일 터치 기반으로 리다이렉트
            renderer.domElement.replaceWith(renderer.domElement.cloneNode(true));
            
            // 리셋된 최신 렌더러 엘리먼트에 포인터 이벤트 바인딩
            const activeCanvas = document.querySelectorAll('canvas')[0] || renderer.domElement;
            activeCanvas.addEventListener('pointerdown', onMobilePointerDown);
            activeCanvas.addEventListener('pointermove', onMobilePointerMove);
            activeCanvas.addEventListener('pointerup', onMobilePointerUp);
            
            setupMobileMenuEvents();
            updateTrackerText();
            console.log("모바일 전용 파일 팝업 및 드래그 예약 시스템 인터셉트 완료.");
        }
    }, 300);

    // [동작 1: 기물 터치 다운]
    function onMobilePointerDown(event) {
        if (isTargetingAttack) {
            // 공격하기를 누른 상태에서 바닥을 탭했을 때
            executeAttackTileSelection();
            return;
        }

        mouseVec.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouseVec.y = -(event.clientY / window.innerHeight) * 2 + 1;
        coreRaycaster.setFromCamera(mouseVec, camera);

        const intersects = coreRaycaster.intersectObjects(scene.children);
        if (intersects.length > 0) {
            const clicked = intersects[0].object;

            // 내가 생성한 기물 부대 리스트(renderPieces) 중에서 터치했는지 판별
            if (typeof renderPieces !== 'undefined' && renderPieces.includes(clicked)) {
                const idx = renderPieces.indexOf(clicked);
                
                if (idx < 16) { // 백진영(블루) 기물 터치 세팅 보장
                    activeMobilePiece = { mesh: clicked, index: idx };
                    
                    // 기물이 서 있는 3D 위치를 2D 화면 좌표로 픽셀 변환하여 팝업 정렬
                    const screenPos = clicked.position.clone().project(camera);
                    const x = (screenPos.x * .5 + .5) * window.innerWidth;
                    const y = (screenPos.y * -.5 + .5) * window.innerHeight;

                    mMenu.style.left = `${x + 25}px`;
                    mMenu.style.top = `${y - 35}px`;
                    mMenu.style.display = 'flex';
                    
                    bookedActions = []; // 기물을 새로 터치하면 예약 초기화
                    updateTrackerText();
                }
            }
        }
    }

    // [동작 2: 드래그 이동 조작 진행 중]
    function onMobilePointerMove(event) {
        if (!isDragMode || !activeMobilePiece) return;

        mouseVec.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouseVec.y = -(event.clientY / window.innerHeight) * 2 + 1;
        planeRaycaster.setFromCamera(mouseVec, camera);

        let intersectPoint = new THREE.Vector3();
        planeRaycaster.ray.intersectPlane(dragPlane, intersectPoint);
        
        // 손가락을 따라 기물이 부드럽게 3D 보드 위에서 공중부양하며 드래그되는 시각 연출
        activeMobilePiece.mesh.position.x = intersectPoint.x;
        activeMobilePiece.mesh.position.z = intersectPoint.z;
        activeMobilePiece.mesh.position.y = 0.7; 
    }

    // [동작 3: 손가락을 떼었을 때 격자 자석 안착]
    function onMobilePointerUp() {
        if (isDragMode && activeMobilePiece) {
            isDragMode = false;
            
            const tSize = 1.15;
            const gridX = Math.round(activeMobilePiece.mesh.position.x / tSize);
            const gridZ = Math.round(activeMobilePiece.mesh.position.z / tSize);
            
            // 8x8 전장 바깥으로 기물이 탈출하지 못하게 강제 보정 좌표 고정
            const finalX = Math.max(-3, Math.min(4, gridX));
            const finalZ = Math.max(-3, Math.min(4, gridZ));

            activeMobilePiece.mesh.position.x = finalX * tSize;
            activeMobilePiece.mesh.position.z = finalZ * tSize;
            activeMobilePiece.mesh.position.y = 0.45; // 원래 기물 고유 높이 복귀

            checkActionsCompletion();
        }
    }

    // 파일 메뉴 버튼 이벤트 바인딩 마스터 컨트롤러
    function setupMobileMenuEvents() {
        // [이동하기 분기]
        document.getElementById('mBtnMove').addEventListener('click', (e) => {
            e.stopPropagation();
            mMenu.style.display = 'none';
            
            bookedActions.push("이동");
            updateTrackerText();
            
            alert("🏃 기물을 잡고 원하는 칸으로 드래그해서 옮겨주세요!");
            isDragMode = true;
        });

        // [공격하기 분기]
        document.getElementById('mBtnAttack').addEventListener('click', (e) => {
            e.stopPropagation();
            mMenu.style.display = 'none';
            
            bookedActions.push("공격");
            updateTrackerText();
            
            alert("⚔️ 타겟팅 모드! 공격을 가할 바닥 타일을 터치해 주세요.");
            isTargetingAttack = true;
        });
    }

    // 공격 지역 타치 감지 장치

            }, 350);

<script>
    (function() {
        let bookedActions = [];       // 예약 행동 보관함
        let reservedTargetTile = null;  // 예약된 이동 목표 좌표
        let currentPieceData = null;    // 현재 제어 중인 기물
        
        let isSelectingMoveTile = false;
        let isSelectingAttackTile = false;

        let moveGuides = []; // 화면에 그려진 동그라미 가이드 메쉬들을 담는 배열

        const localRaycaster = new THREE.Raycaster();
        const localMouse = new THREE.Vector2();

        // 부팅 및 이벤트 재연결
        const initGuideEngine = setInterval(() => {
            if (typeof renderer !== 'undefined' && typeof camera !== 'undefined' && typeof scene !== 'undefined') {
                clearInterval(initGuideEngine);

                // 이전 이벤트 충돌 방지를 위해 캔버스 클론 교체
                const oldCanvas = renderer.domElement;
                const newCanvas = oldCanvas.cloneNode(true);
                oldCanvas.parentNode.replaceChild(newCanvas, oldCanvas);

                newCanvas.addEventListener('pointerdown', handleTacticalTouchWithGuide);
                setupGuideMenuEvents();
                console.log("체스식 네온 동그라미 이동 가이드 시스템 동기화 완료.");
            }
        }, 300);

        // [핵심 기능] 기물 주변 8칸에 초록색 네온 동그라미 가이드를 그리는 함수
        function showMoveGuides(pieceMesh) {
            // 기존에 남아있던 동그라미 가이드가 있다면 싹 청소
            clearMoveGuides();

            const tSize = 1.15;
            // 현재 기물의 8방향 주변 그리드 좌표 오프셋 (앞, 뒤, 좌, 우, 대각선 4방향)
            const directions = [
                {x: 1, z: 0}, {x: -1, z: 0}, {x: 0, z: 1}, {x: 0, z: -1},
                {x: 1, z: 1}, {x: 1, z: -1}, {x: -1, z: 1}, {x: -1, z: -1}
            ];

            directions.forEach(dir => {
                // 기물의 현재 위치에서 1칸 옆 좌표 계산
                const targetX = pieceMesh.position.x + (dir.x * tSize);
                const targetZ = pieceMesh.position.z + (dir.z * tSize);

                // 체스판 경계선 안쪽일 때만 동그라미 생성 (판 밖으로 나가는 거 방지)
                if (Math.abs(targetX) <= 4 * tSize && Math.abs(targetZ) <= 4 * tSize) {
                    // 원판(링) 모양의 3D 지오메트리 생성
                    const guideGeo = new THREE.RingGeometry(0.2, 0.35, 16);
                    // 밟으면 빛나는 느낌의 뚫리는 야광 초록색 재질
                    const guideMat = new THREE.MeshBasicMaterial({ 
                        color: 0x00ffcc, 
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.8
                    });
                    const guideMesh = new THREE.Mesh(guideGeo, guideMat);
                    
                    // 링이 바닥 타일 위에 평평하게 눕도록 90도 회전
                    guideMesh.rotation.x = Math.PI / 2;
                    // 바닥 타일보다 살짝 위(y=0.1)에 띄워서 안 겹치게 배치
                    guideMesh.position.set(targetX, 0.1, targetZ);
                    
                    // 레이캐스터 픽업용 플래그 주입
                    guideMesh.userData = { isMoveGuide: true };

                    scene.add(guideMesh);
                    moveGuides.push(guideMesh); // 관리 배열에 추가
                }
            });
        }

        // 가이드 동그라미들을 화면에서 흔적도 없이 지우는 함수
        function clearMoveGuides() {
            moveGuides.forEach(g => scene.remove(g));
            moveGuides = [];
        }

        // 터치 제어 마스터 핸들러
        function handleTacticalTouchWithGuide(event) {
            localMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            localMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            localRaycaster.setFromCamera(localMouse, camera);

            const intersects = localRaycaster.intersectObjects(scene.children);
            if (intersects.length === 0) return;

            const clickedObj = intersects[0].object;

            // 분기 1: [이동 칸 선택 모드]일 때
            if (isSelectingMoveTile) {
                // 유저가 초록색 네온 동그라미 가이드를 정확히 찔렀는지 판별!
                if (clickedObj.userData && clickedObj.userData.isMoveGuide) {
                    reservedTargetTile = clickedObj.position.clone(); // 동그라미 좌표 선점
                    isSelectingMoveTile = false;
                    
                    clearMoveGuides(); // 이동지를 골랐으니 동그라미 숨기기
                    alert("📍 이동할 가이드 칸 예약 성공!");
                    checkTrueActionsCompletionWithGuide();
                } else {
                    alert("초록색 네온 동그라미 가이드 중 한 곳을 터치해 주세요!");
                }
                return;
            }

            // 분기 2: [공격 모드]일 때
            if (isSelectingAttackTile) {
                isSelectingAttackTile = false;
                alert("🎯 공격 범위 타겟 예약 완료!");
                checkTrueActionsCompletionWithGuide();
                return;
            }

            // 분기 3: 일반 상태에서 내 기물 클릭 시 파일 메뉴 팝업
            if (typeof renderPieces !== 'undefined' && renderPieces.includes(clickedObj)) {
                const pIdx = renderPieces.indexOf(clickedObj);
                
                if (pIdx < 16) { // 백진영 기물 락인
                    currentPieceData = { mesh: clickedObj, index: pIdx };
                    
                    const screenPos = clickedObj.position.clone().project(camera);
                    const x = (screenPos.x * .5 + .5) * window.innerWidth;
                    const y = (screenPos.y * -.5 + .5) * window.innerHeight;

                    const menu = document.getElementById('mobileContextMenu');
                    if (menu) {
                        menu.style.left = `${x + 25}px`;
                        menu.style.top = `${y - 35}px`;
                        menu.style.display = 'flex';
                    }
                    
                    bookedActions = [];
                    reservedTargetTile = null;
                    clearMoveGuides();
                    updateTrueTrackerWithGuide();
                }
            }
        }

        // 파일 메뉴 버튼 매핑
        function setupGuideMenuEvents() {
            const menu = document.getElementById('mobileContextMenu');
            if (!menu) return;

            document.getElementById('mBtnMove').onclick = function(e) {
                e.stopPropagation();
                menu.style.display = 'none';
                
                bookedActions.push("이동");
                updateTrueTrackerWithGuide();
                
                // 🔥 이동을 누르는 순간 기물 주변에 동그라미 가이드 쫙 오픈!
                if (currentPieceData) {
                    showMoveGuides(currentPieceData.mesh);
                }
                isSelectingMoveTile = true;
            };

            document.getElementById('mBtnAttack').onclick = function(e) {
                e.stopPropagation();
                menu.style.display = 'none';
                
                bookedActions.push("공격");
                updateTrueTrackerWithGuide();
                
                alert("⚔️ 공격 사거리에 꽂아 넣을 타겟 타일을 터치하세요!");
                isSelectingAttackTile = true;
            };
        }

        // 트래커 상태창 리프레시
        function updateTrueTrackerWithGuide() {
            const trackTxt = document.getElementById('trackTxt');
            if (!trackTxt) return;

            if (bookedActions.length === 0) {
                trackTxt.innerHTML = `<b style='color:#aaa;'>기물 선택 대기 중</b>`;

                trackTxt.innerHTML = `<span style='color:#00ffcc; font-weight:bold;'>[백 1번]: ${bookedActions[0]}</span> ➡️ <b style='color:#ffcc00;'>[2번 예약 대기]</b>`;
            } else if (bookedActions.length === 2) {
                trackTxt.innerHTML = `<span style='color:#00ffcc; font-weight:bold;'>[백 1번]: ${bookedActions[0]}</span> ➡️ <span style='color:#ff0055; font-weight:bold;'>[백 2번]: ${bookedActions[1]}</span>`;
            }
        }

        // 두 행동 모두 완료 시 시뮬레이터 및 기물 진짜 3D 이동 반영
        function checkTrueActionsCompletionWithGuide() {
            if (bookedActions.length >= 2) {
                setTimeout(() => {
                    const bot1 = Math.random() > 0.5 ? "이동" : "공격";
                    const bot2 = bot1 === "이동" ? "공격" : "이동";

                    let log = `⚡ [심리전 예약 교차 실행 발동!]\n\n`;
                    log += `1️⃣ [백 1번]: 백선수 ${bookedActions[0]} 개시!\n`;
                    log += `2️⃣ [흑 1번]: 흑선수(AI) ${bot1} 개시!\n`;
                    log += `3️⃣ [백 2번]: 백선수 ${bookedActions[1]} 개시!\n`;
                    log += `4️⃣ [흑 2번]: 흑선수(AI) ${bot2} 개시!\n\n`;
                    log += `🎬 [실시간 반영]: 예약 대결이 완료되어 기물이 선택한 가이드 칸으로 진짜 이동합니다!`;

                    alert(log);

                    // 진짜로 3D 공간 상에서 기물 슥 이동 처리
                    if (reservedTargetTile && currentPieceData) {
                        currentPieceData.mesh.position.x = reservedTargetTile.x;
                        currentPieceData.mesh.position.z = reservedTargetTile.z;
                        currentPieceData.mesh.position.y = 0.45; // 기물 착지 안착
                    }

                    // 초기화
                    bookedActions = [];
                    reservedTargetTile = null;
                    currentPieceData = null;
                    clearMoveGuides();
                    updateTrueTrackerWithGuide();

                }, 300);
            } else {
                // 행동 1개만 정했으면 마저 행동 2 채우라고 메뉴 복귀
                setTimeout(() => {
                    if (currentPieceData) {
                        const screenPos = currentPieceData.mesh.position.clone().project(camera);
                        const x = (screenPos.x * .5 + .5) * window.innerWidth;
                        const y = (screenPos.y * -.5 + .5) * window.innerHeight;
                        const menu = document.getElementById('mobileContextMenu');
                        if (menu) {
                            menu.style.left = `${x + 25}px`;
                            menu.style.top = `${y - 35}px`;
                            menu.style.display = 'flex';
                        }
                    }
                }, 450);
            }
        }
    })();
</script>
