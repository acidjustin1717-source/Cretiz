<style>
    /* 턴 표시를 위한 전용 UI 스타일 추가 */
    #turnIndicator {
        position: absolute; top: 20px; right: 20px; font-size: 1.5rem;
        color: #ffcc00; font-weight: bold; z-index: 100; pointer-events: none;
        background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px;
        border: 1px solid #ffcc00; display: none;
    }
</style>
<div id="turnIndicator">내 턴 (플레이어 A)</div>

<script>
    // 기존에 돌고 있던 2D/3D 액션 게임 루프나 인터벌이 있다면 안전하게 초기화
    if (typeof loginDetectInterval !== 'undefined') clearInterval(loginDetectInterval);
    
    let boardScene, boardCamera, boardRenderer;
    let boardSquares = []; // 8x8 보드판 타일들
    let playerPiece, enemyPiece; // 플레이어 말과 적 말
    let currentTurn = 'player'; // 'player' 또는 'enemy' (턴제 제어용)
    let selectedPiece = null;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();

    // 3D 보드게임 세상을 만드는 함수
    function initBoardGame() {
        // 기존 화면 초기화 (액션 게임용 요소들 숨기기/삭제)
        const canvas2D = document.getElementById('gameCanvas');
        if (canvas2D) canvas2D.style.display = 'none';
        document.getElementById('turnIndicator').style.display = 'block';

        // 1. 3D 무대 및 카메라 구성
        boardScene = new THREE.Scene();
        boardScene.background = new THREE.Color(0x111118);

        // 보드판을 비스듬히 내려다보는 쿼터뷰 카메라
        boardCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        boardCamera.position.set(0, 12, 10);
        boardCamera.lookAt(0, 0, 0);

        // 3D 화가 배치
        boardRenderer = new THREE.WebGLRenderer({ antialias: true });
        boardRenderer.setSize(window.innerWidth, window.innerHeight);
        boardRenderer.domElement.style.position = 'absolute';
        boardRenderer.domElement.style.top = '0';
        boardRenderer.domElement.style.left = '0';
        boardRenderer.domElement.style.zIndex = '10'; // 제일 위에 노출
        document.body.appendChild(boardRenderer.domElement);

        // 조명 추가
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        boardScene.add(ambient);
        const point = new THREE.PointLight(0x00ffcc, 1, 100);
        point.position.set(0, 10, 5);
        boardScene.add(point);

        // 2. 4x4 미니 보드판 생성 (격자 타일 배치)
        const tileSize = 1.5;
        for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 4; col++) {
                const geo = new THREE.BoxGeometry(tileSize - 0.1, 0.2, tileSize - 0.1);
                // 체스판처럼 번갈아가며 색상 지정
                const isEven = (row + col) % 2 === 0;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: isEven ? 0x222530 : 0x3b3f54,
                    roughness: 0.4
                });
                const tile = new THREE.Mesh(geo, mat);
                // 중심을 기준으로 정렬하여 배치
                tile.position.set((col - 1.5) * tileSize, 0, (row - 1.5) * tileSize);
                // 타일의 행/열 정보를 오브젝트에 커스텀 데이터로 저장
                tile.userData = { isTile: true, row: row, col: col };
                boardScene.add(tile);
                boardSquares.push(tile);
            }
        }

        // 3. 플레이어 말 (파란색 실린더) & 적의 말 (붉은색 콘) 생성
        const pGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.8, 16);
        const pMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.5 });
        playerPiece = new THREE.Mesh(pGeo, pMat);
        // 왼쪽 아래 칸 (0,0)에 배치
        setPiecePosition(playerPiece, 0, 0);
        playerPiece.userData = { isPlayer: true, row: 0, col: 0 };
        boardScene.add(playerPiece);

        const eGeo = new THREE.ConeGeometry(0.4, 0.8, 16);
        const eMat = new THREE.MeshStandardMaterial({ color: 0xff3366, metalness: 0.5 });
        enemyPiece = new THREE.Mesh(eGeo, eMat);
        // 오른쪽 위 칸 (3,3)에 배치
        setPiecePosition(enemyPiece, 3, 3);
        enemyPiece.userData = { isEnemy: true, row: 3, col: 3 };
        boardScene.add(enemyPiece);

        // 4. 마우스 클릭으로 말 움직이기 이벤트 등록
        boardRenderer.domElement.addEventListener('click', onBoardClick);

        // 5. 렌더링 루프
        function renderBoard() {
            requestAnimationFrame(renderBoard);
            // 말들이 살아있는 것처럼 아주 살짝씩 회전
            if (playerPiece) playerPiece.rotation.y += 0.01;
            if (enemyPiece) enemyPiece.rotation.y += 0.01;
            boardRenderer.render(boardScene, boardCamera);
        }
        renderBoard();
    }

    // 말을 특정 행/열 타일 위로 순간이동 시키는 헬퍼 함수
    function setPiecePosition(piece, row, col) {
        const tileSize = 1.5;
        piece.position.set((col - 1.5) * tileSize, 0.5, (row - 1.5) * tileSize);
        piece.userData.row = row;
        piece.userData.col = col;
    }

    // 보드판 클릭 처리 (턴제 핵심 로직)
    function onBoardClick(event) {
        if (currentTurn !== 'player') return; // 내 턴이 아니면 클릭 거부

        // 마우스 클릭 위치를 3D 공간 좌표로 변환 (Raycasting)
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, boardCamera);
        
        const intersects = raycaster.intersectObjects(boardScene.children);

        if (intersects.length > 0) {
            const clickedObj = intersects[0].object;

            // 1. 내 말을 클릭했을 때 -> 선택 상태로 전환
            if (clickedObj.userData.isPlayer) {
                selectedPiece = clickedObj;
                document.getElementById('turnIndicator').innerText = "이동할 칸을 선택하세요";
                document.getElementById('turnIndicator').style.color = "#00ffcc";
                return;
            }

            // 2. 말을 선택한 상태에서 타일을 클릭했을 때 -> 이동 검사
            if (selectedPiece && clickedObj.userData.isTile) {
                const targetRow = clickedObj.userData.row;
                const targetCol = clickedObj.userData.col;
                
                const currRow = selectedPiece.userData.row;
                const currCol = selectedPiece.userData.col;

                // 상하좌우 1칸씩만 이동 가능한 규칙 (턴제 제약 조건)
                const rowDist = Math.abs(targetRow - currRow);
                const colDist = Math.abs(targetCol - currCol);

                if ((rowDist === 1 && colDist === 0) || (rowDist === 0 && colDist === 1)) {
                    // 말 이동시키기
                    setPiecePosition(selectedPiece, targetRow, targetCol);
                    selectedPiece = null;

                    // 승리 조건 체크 (상대방 말과 같은 칸에 도달하면 승리)
                    if (targetRow === enemyPiece.userData.row && targetCol === enemyPiece.userData.col) {
                        alert("🎉 축하합니다! 적을 잡아서 승리했습니다!");
                        location.reload();
                        return;
                    }

                    // 플레이어 턴 종료 -> 적(AI) 턴으로 전환
                    currentTurn = 'enemy';
                    document.getElementById('turnIndicator').innerText = "적 컴퓨터가 생각 중...";
                    document.getElementById('turnIndicator').style.color = "#ff3366";

                    // 1초 뒤 컴퓨터가 자동으로 움직이게 타이머 작동
                    setTimeout(enemyTurnLogic, 1000);
                } else {
                    alert("상하좌우로 딱 1칸만 움직일 수 있습니다!");
                }
            }
        }
    }

    // 간단한 적 인공지능(AI) 턴 로직
    function enemyTurnLogic() {
        const eRow = enemyPiece.userData.row;
        const eCol = enemyPiece.userData.col;
        const pRow = playerPiece.userData.row;
        const pCol = playerPiece.userData.col;

        let nextRow = eRow;
        let nextCol = eCol;

        // 플레이어 캐릭터가 있는 방향을 추적해서 1칸 다가오는 인공지능 규칙
        if (eRow !== pRow) {
            nextRow += (pRow > eRow) ? 1 : -1;
        } else if (eCol !== pCol) {
            nextCol += (pCol > eCol) ? 1 : -1;
        }

        // 범위 이탈 방지 가드
        nextRow = Math.max(0, Math.min(3, nextRow));
        nextCol = Math.max(0, Math.min(3, nextCol));

        // 컴퓨터 말 이동
        setPiecePosition(enemyPiece, nextRow, nextCol);

        // 패배 조건 체크
        if (nextRow === playerPiece.userData.row && nextCol === playerPiece.userData.col) {
            alert("💀 으악! 컴퓨터에게 잡혔습니다. 패배!");
            location.reload();
            return;
        }

        // 적 턴 종료 -> 다시 플레이어 턴으로 복귀
        currentTurn = 'player';
        document.getElementById('turnIndicator').innerText = "내 턴 (플레이어 A)";
        document.getElementById('turnIndicator').style.color = "#ffcc00";
    }

    // 기존 로그인 이벤트 인터셉터에 새 보드게임 연결하기
    const boardGameHookInterval = setInterval(() => {
        const loginBtn = document.getElementById('mainBtn') || document.getElementById('authBtn');
        const loginInput = document.getElementById('myId') || document.getElementById('userIdInput');
        const loginPw = document.getElementById('myPw') || document.getElementById('userPwInput');

        if (loginBtn) {
            clearInterval(boardGameHookInterval);
            loginBtn.addEventListener('click', () => {
                const id = loginInput.value.trim();
                const pw = loginPw.value.trim();
                if (id && pw && (localStorage.getItem('game_user_' + id) === pw || localStorage.getItem('user_' + id) === pw)) {
                    // 로그인 장벽 통과 시 액션 게임 대신 3D 턴제 보드게임 실행!
                    setTimeout(initBoardGame, 200);
                }
            });
        }
    }, 100);

    window.addEventListener('resize', () => {
        if (boardCamera && boardRenderer) {
            boardCamera.aspect = window.innerWidth / window.innerHeight;
            boardCamera.updateProjectionMatrix();
            boardRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>
