<style>
    /* 짭체스 게임 전용 UI 대기실 */
    #chessUiOverlay {
        position: absolute; top: 20px; left: 20px; font-size: 1.2rem;
        color: #00ffcc; z-index: 100; pointer-events: none;
        background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
        border: 1px solid #00ffcc; display: none; font-family: sans-serif;
    }
    #chessUiOverlay h3 { color: #ffcc00; margin-bottom: 5px; }
    .score-board { display: flex; gap: 20px; margin-top: 5px; font-size: 1rem; }
    .score-white { color: #ffffff; }
    .score-black { color: #ff3366; }
</style>

<div id="chessUiOverlay">
    <h3>Cretyz Tactical Chess</h3>
    <div id="turnStatus">게임 준비 완료! (기물 배치 중)</div>
    <div class="score-board">
        <span class="score-white">백 진영 점수: <b id="scoreWhite">0</b> / 20</span>
        <span class="score-black">흑 진영 점수: <b id="scoreBlack">0</b> / 20</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // 기존 액션게임이나 미니 보드게임 루프가 살아있다면 강제 종료
    if (typeof loginDetectInterval !== 'undefined') clearInterval(loginDetectInterval);
    if (typeof boardGameHookInterval !== 'undefined') clearInterval(boardGameHookInterval);

    let cScene, cCamera, cRenderer;
    let chessBoard = []; // 8x8 판 배열
    let allPieces = [];  // 현재 살아있는 모든 기물 배열

    // 전역 점수 상태
    let scores = { white: 0, black: 0 };

    // 짭체스 8x8 무대 생성기
    function startCretyzChess() {
        // 기존 2D 캔버스 완전 삭제/숨김
        const canvas2D = document.getElementById('gameCanvas');
        if (canvas2D) canvas2D.style.display = 'none';
        document.getElementById('chessUiOverlay').style.display = 'block';

        // 1. 3D 무대 및 스마트 탑뷰 카메라 구성
        cScene = new THREE.Scene();
        cScene.background = new THREE.Color(0x0a0a0f);

        cCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        cCamera.position.set(0, 14, 9); // 8x8 판을 한눈에 보게 카메라 높이 UP
        cCamera.lookAt(0, 0, -1);

        // 3D 화가 켜기
        cRenderer = new THREE.WebGLRenderer({ antialias: true });
        cRenderer.setSize(window.innerWidth, window.innerHeight);
        cRenderer.domElement.style.position = 'absolute';
        cRenderer.domElement.style.top = '0';
        cRenderer.domElement.style.left = '0';
        cRenderer.domElement.style.zIndex = '50'; // 화면 최상단 강제 점령
        document.body.appendChild(cRenderer.domElement);

        // 조명 (네온 SF 체스판 느낌)
        const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
        cScene.add(ambLight);
        const dirLight1 = new THREE.DirectionalLight(0x00ffcc, 0.8);
        dirLight1.position.set(5, 15, 5);
        cScene.add(dirLight1);
        const dirLight2 = new THREE.DirectionalLight(0xff0055, 0.4);
        dirLight2.position.set(-5, 15, -5);
        cScene.add(dirLight2);

        // 2. 정식 8x8 보드판 생성
        const size = 1.2; // 타일 한 칸 크기
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const geo = new THREE.BoxGeometry(size - 0.08, 0.15, size - 0.08);
                const isEven = (row + col) % 2 === 0;
                // 네온 그리드 스타일의 고급 재질
                const mat = new THREE.MeshStandardMaterial({
                    color: isEven ? 0x161922 : 0x282c3d,
                    roughness: 0.5,
                    metalness: 0.2
                });
                const tile = new THREE.Mesh(geo, mat);
                // 8x8 중앙 정렬 계산 배치
                tile.position.set((col - 3.5) * size, 0, (row - 3.5) * size);
                tile.userData = { isTile: true, row: row, col: col, hasWall: false };
                cScene.add(tile);
                chessBoard.push(tile);
            }
        }

        // 3. 승현이 기획서 기반 기물 스폰 (백진영: row 0~1, 흑진영: row 6~7)
        // 백진영 (유저 팀) 세팅
        spawnRowPieces('white', 0, 1);
        // 흑진영 (상대 팀) 세팅
        spawnRowPieces('black', 7, 6);

        document.getElementById('turnStatus').innerText = "행동 예약 대기 중... (백선수 선공)";

        // 4. 애니메이션 루프 구동
        function animateChess() {
            requestAnimationFrame(animateChess);
            
            // 기물들 둠칫둠칫 약한 회전 효과로 살아있는 느낌 주기
            allPieces.forEach(p => {
                if (p.mesh) p.mesh.rotation.y += 0.005;
            });

            cRenderer.render(cScene, cCamera);
        }
        animateChess();
    }

    // 진영별 기물들을 스폰하는 내부 마스터 함수
    function spawnRowPieces(team, backRow, pawnRow) {
        const size = 1.2;
        const colorHex = (team === 'white') ? 0x00aaff : 0xff3366; // 백: 블루네온, 흑: 핑크네온

        // 폰 8마리 쫙 깔기 (승현이 기획: HP 1, DMG 1, SCORE 1)
        for (let col = 0; col < 8; col++) {
            const pGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.5, 12);
            const pMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.3 });
            const pMesh = new THREE.Mesh(pGeo, pMat);
            pMesh.position.set((col - 3.5) * size, 0.35, (pawnRow - 3.5) * size);
            cScene.add(pMesh);

            allPieces.push({
                mesh: pMesh, team: team, type: 'pawn', isSuper: false, isHero: false,
                row: pawnRow, col: col, maxHp: 1, hp: 1, dmg: 1, score: 1, isStunned: false
            });
        }

        // 뒷줄 정예 기물 일렬 배치 규칙 (룩, 나이트, 비숍, 퀸, 킹, 비숍, 나이트, 룩)
        const backTypes = ['look', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'look'];
        
        // 기물 종류별 스펙 데이터 매핑 데이터베이스
        const specs = {
            king:   { hp: 5, dmg: 1, score: 5, geo: new THREE.BoxGeometry(0.5, 0.9, 0.5) },
            queen:  { hp: 3, dmg: 2, score: 4, geo: new THREE.CylinderGeometry(0.2, 0.4, 0.8, 8) },
            look:   { hp: 3, dmg: 1, score: 3, geo: new THREE.BoxGeometry(0.45, 0.7, 0.45) },
            knight: { hp: 3, dmg: 2, score: 3, geo: new THREE.ConeGeometry(0.35, 0.8, 4) },
            bishop: { hp: 1, dmg: 3, score: 3, geo: new THREE.CylinderGeometry(0.1, 0.35, 0.7, 16) }
        };

        for (let col = 0; col < 8; col++) {
            const type = backTypes[col];
            const spec = specs[type];

            const mat = new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.4, roughness: 0.2 });
            const mesh = new THREE.Mesh(spec.geo, mat);
            mesh.position.set((col - 3.5) * size, 0.5, (backRow - 3.5) * size);
            cScene.add(mesh);

            allPieces.push({
                mesh: mesh, team: team, type: type,
                row: backRow, col: col, maxHp: spec.hp, hp: spec.hp, dmg: spec.dmg, score: spec.score,
                isStunned: false, ammo: (type==='queen')? 2 : (type==='bishop')? 1 : 0, needReload: false
            });
        }
    }

    // 짭체스 강제 연결 고리 인터셉터
    const chessHookInterval = setInterval(() => {
        const loginBtn = document.getElementById('mainBtn') || document.getElementById('authBtn');
        const loginInput = document.getElementById('myId') || document.getElementById('userIdInput');
        const loginPw = document.getElementById('myPw') || document.getElementById('userPwInput');

        if (loginBtn) {
            clearInterval(chessHookInterval);
            loginBtn.addEventListener('click', () => {
                const id = loginInput.value.trim();
                const pw = loginPw.value.trim();
                if (id && pw && (localStorage.getItem('game_user_' + id) === pw || localStorage.getItem('user_' + id) === pw)) {
                    // 로그인 성공 시 짭체스 월드로 무대 강제 변환 작동
                    setTimeout(startCretyzChess, 200);
                }
            });
        }
    }, 100);

    window.addEventListener('resize', () => {
        if (cCamera && cRenderer) {
            cCamera.aspect = window.innerWidth / window.innerHeight;
            cCamera.updateProjectionMatrix();
            cRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>
