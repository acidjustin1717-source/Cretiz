<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cretyz Tactical Chess</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050608; overflow: hidden; font-family: sans-serif; -webkit-user-select: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* 타이틀 및 스코어 보드 통합 패널 */
        #chessUiOverlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(10, 11, 18, 0.9); padding: 15px; border-radius: 8px;
            border: 2px solid #00ffcc; color: #00ffcc; font-size: 1.1rem; z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2); pointer-events: none;
        }
        #chessUiOverlay h3 { margin: 0 0 8px 0; color: #ffcc00; font-size: 1.3rem; }
        .score-board { display: flex; gap: 20px; margin-top: 5px; font-size: 0.95rem; }
        .score-white { color: #ffffff; }
        .score-black { color: #ff3366; }

        /* 📋 백1, 백2 행동 예약 트래커 패널 */
        #reservationTracker {
            position: absolute; top: 150px; left: 20px;
            background: rgba(15, 17, 26, 0.95); border: 2px solid #ffcc00;
            color: #ffcc00; padding: 10px 14px; border-radius: 8px;
            font-size: 0.9rem; font-weight: bold; z-index: 100;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2); pointer-events: none;
        }

        /* 📱 기물 머리맡에 둥둥 뜰 모바일 전용 수기 파일 메뉴 */
        #mobileContextMenu {
            position: absolute; z-index: 5000; display: none;
            flex-direction: column; gap: 6px; background: rgba(10, 11, 18, 0.95);
            border: 2px solid #00ffcc; padding: 8px; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,255,204,0.4); pointer-events: auto;
        }
        .menu-item-btn {
            padding: 8px 16px; border: none; background: #1a1d29; color: #fff;
            font-weight: bold; font-size: 0.9rem; border-radius: 4px; cursor: pointer;
            text-align: center; white-space: nowrap; min-width: 100px;
        }
        .menu-item-btn:active { background: #00ffcc; color: #000; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="chessUiOverlay">
        <h3>Cretyz Tactical Chess</h3>
        <div id="statusTxt">전장 로딩 완료! (백선수 예약 대기)</div>
        <div class="score-board">
            <span class="score-white">백 점수: <b id="scoreW">0</b> / 20</span>
            <span class="score-black">흑 점수: <b id="scoreB">0</b> / 20</span>
        </div>
    </div>

    <div id="reservationTracker">
        📋 현재 예약 상태: <span id="trackTxt">대기 중</span>
    </div>

    <div id="mobileContextMenu">
        <button class="menu-item-btn" id="mBtnMove">🏃 이동하기</button>
        <button class="menu-item-btn" id="mBtnAttack">⚔️ 공격하기</button>
    </div>

    <script>
        // --- 1. 3D 핵심 엔진 초기화 장치 (암전 버그 완벽 예방) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050608);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 9, 8);
        camera.lookAt(0, -0.5, 0.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 조명 설치
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 12, 8);
        scene.add(dirLight);

        // --- 2. 3D 전장 보드판 및 기물 자동 빌드 시스템 ---
        const tileSize = 1.15;
        const boardTiles = [];
        const renderPieces = [];

        // 8x8 바둑판 타일 깔기
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const tileGeo = new THREE.BoxGeometry(tileSize - 0.04, 0.15, tileSize - 0.04);
                const isEven = (row + col) % 2 === 0;
                const tileMat = new THREE.MeshStandardMaterial({
                    color: isEven ? 0x1e2230 : 0x0f111a,
                    roughness: 0.4,
                    metalness: 0.2
                });
                const tileMesh = new THREE.Mesh(tileGeo, tileMat);
                tileMesh.position.set((col - 3.5) * tileSize, -0.075, (row - 3.5) * tileSize);
                scene.add(tileMesh);
                boardTiles.push(tileMesh);
            }
        }

        // 백진영(블루 네온), 흑진영(레드 네온) 기물 배치
        function createPieceMesh(colorHex, type, x, z) {
            let geo;
            if (type === 'pawn') geo = new THREE.CylinderGeometry(0.22, 0.32, 0.55, 16);
            else if (type === 'rook') geo = new THREE.BoxGeometry(0.42, 0.65, 0.42);
            else geo = new THREE.ConeGeometry(0.28, 0.7, 16);

            const mat = new THREE.MeshStandardMaterial({
                color: colorHex,
                emissive: colorHex,
                emissiveIntensity: 0.3,
                roughness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.275, z);
            scene.add(mesh);
            renderPieces.push(mesh);
        }

        // 백군(블루, 인덱스 0~15)
        for(let i=0; i<8; i++) createPieceMesh(0x00f0ff, 'pawn', (i-3.5)*tileSize, 2.5*tileSize);
        for(let i=0; i<8; i++) createPieceMesh(0x0088ff, 'rook', (i-3.5)*tileSize, 3.5*tileSize);

        // 흑군(레드, 인덱스 16~31)
        for(let i=0; i<8; i++) createPieceMesh(0xff0055, 'pawn', (i-3.5)*tileSize, -2.5*tileSize);
        for(let i=0; i<8; i++) createPieceMesh(0xaa0033, 'rook', (i-3.5)*tileSize, -3.5*tileSize);


        // --- 3. Chess.com 스타일 실시간 가이드 및 시스템 로직 ---
        let bookedActions = [];
        let reservedTargetTile = null;
        let currentPieceData = null;
        let isSelectingMoveTile = false;
        let isSelectingAttackTile = false;
        let tacticalGuides = [];

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const mMenu = document.getElementById('mobileContextMenu');
        const trackTxt = document.getElementById('trackTxt');

        // 터치 업 감지 메인 캔버스 리스너
        renderer.domElement.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(scene.children);
            if (intersects.length === 0) return;

            const clicked = intersects[0].object;

            // 가이드 링 고리를 선택한 경우
            if (isSelectingMoveTile || isSelectingAttackTile) {
                if (clicked.userData && clicked.userData.isTacticalGuide) {
                    reservedTargetTile = clicked.userData.associatedTilePos.clone();
                    const currentMode = isSelectingMoveTile ? "이동" : "공격";
                    isSelectingMoveTile = false;
                    isSelectingAttackTile = false;
                    
                    clearTacticalGuides();
                    alert(`📍 [백 ${bookedActions.length}번 행동]: ${currentMode} 할 위치 선택 완료!`);
                    checkTurnCompletion();
                } else {
                    alert("표시된 동그라미 가이드 중 한 곳을 정확히 터치해 주세요!");
                }
                return;
            }

            // 아군 기물(백군) 터치 시 파일 메뉴 팝업 생성
            if (renderPieces.includes(clicked)) {
                const idx = renderPieces.indexOf(clicked);
                if (idx < 16) { // 아군 식별 락
                    currentPieceData = { mesh: clicked, index: idx };
                    
                    const screenPos = clicked.position.clone().project(camera);
                    const x = (screenPos.x * .5 + .5) * window.innerWidth;
                    const y = (screenPos.y * -.5 + .5) * window.innerHeight;

                    mMenu.style.left = `${x + 20}px`;
                    mMenu.style.top = `${y - 40}px`;
                    mMenu.style.display = 'flex';
                    
                    bookedActions = [];
                    reservedTargetTile = null;
                    clearTacticalGuides();
                    updateTrackerUI();
                }
            }
        });

        // 유효 사거리 탐색 및 네온 링 가이드 발사기
        function showTacticalRange(pieceMesh, mode) {
            clearTacticalGuides();

            boardTiles.forEach(tile => {
                const diffX = Math.abs(tile.position.x - pieceMesh.position.x);
                const diffZ = Math.abs(tile.position.z - pieceMesh.position.z);

                // 상하좌우대각선 1칸 범위 판정 규칙 알고리즘
                if (diffX <= tileSize * 1.1 && diffZ <= tileSize * 1.1 && !(diffX === 0 && diffZ === 0)) {
                    const guideGeo = new THREE.RingGeometry(0.18, 0.35, 16);
                    const guideColor = (mode === "이동") ? 0x00ffcc : 0xff0055;
                    const guideMat = new THREE.MeshBasicMaterial({
                        color: guideColor, side: THREE.DoubleSide, transparent: true, opacity: 0.85
                    });
                    const guideMesh = new THREE.Mesh(guideGeo, guideMat);
                    guideMesh.rotation.x = Math.PI / 2;
                    guideMesh.position.set(tile.position.x, 0.05, tile.position.z);
                    
                    guideMesh.userData = { isTacticalGuide: true, associatedTilePos: tile.position.clone() };
                    scene.add(guideMesh);
                    tacticalGuides.push(guideMesh);
                }
            });
        }

        function clearTacticalGuides() {
            tacticalGuides.forEach(g => scene.remove(g));
            tacticalGuides = [];
        }

        // 메뉴 클릭 연동
        document.getElementById('mBtnMove').onclick = (e) => {
            e.stopPropagation(); mMenu.style.display = 'none';
            bookedActions.push("이동"); updateTrackerUI();
            isSelectingMoveTile = true;
            showTacticalRange(currentPieceData.mesh, "이동");
        };

        document.getElementById('mBtnAttack').onclick = (e) => {
            e.stopPropagation(); mMenu.style.display = 'none';
            bookedActions.push("공격"); updateTrackerUI();
            isSelectingAttackTile = true;
            showTacticalRange(currentPieceData.mesh, "공격");
        };

        function updateTrackerUI() {
            if (bookedActions.length === 0) trackTxt.innerHTML = `<b style='color:#aaa;'>기물 선택 대기 중</b>`;
            else if (bookedActions.length === 1) trackTxt.innerHTML = `<span style='color:#00ffcc;'>[백 1번]: ${bookedActions[0]} 완료</span> ➡️ <b style='color:#ffcc00;'>[2번 대기]</b>`;
            else if (bookedActions.length === 2) trackTxt.innerHTML = `<span style='color:#00ffcc;'>[백 1번]: ${bookedActions[0]}</span> ➡️ <span style='color:#ff0055;'>[백 2번]: ${bookedActions[1]}</span>`;
        }

        // 행동 완료 동시성 처리 및 기물 순간이동 연산 마스터
        function checkTurnCompletion() {
            if (bookedActions.length >= 2) {
                setTimeout(() => {
                    const bot1 = Math.random() > 0.5 ? "이동" : "공격";
                    const bot2 = bot1 === "이동" ? "공격" : "이동";

                    let log = `⚡ [심리 예측 턴 결산 결과]\n\n`;
                    log += `1️⃣ [백 1번 행동]: 백선수 ${bookedActions[0]} 실행\n`;
                    log += `2️⃣ [흑 1번 행동]: 흑선수(AI) ${bot1} 대응\n`;
                    log += `3️⃣ [백 2번 행동]: 백선수 ${bookedActions[1]} 실행\n`;
                    log += `4️⃣ [흑 2번 행동]: 흑선수(AI) ${bot2} 대응\n\n`;
                    log += `🎬 전장 업데이트: 내가 고른 가이드 좌표칸으로 3D 기물이 실제 이동합니다!`;

                    alert(log);

                    // 진짜 3D 좌표로 기물 정위치 안착 슛
                    if (reservedTargetTile && currentPieceData) {
                        currentPieceData.mesh.position.x = reservedTargetTile.x;
                        currentPieceData.mesh.position.z = reservedTargetTile.z;
                        currentPieceData.mesh.position.y = 0.275;
                    }

                    // 리셋
                    bookedActions = []; reservedTargetTile = null; currentPieceData = null;
                    clearTacticalGuides(); updateTrackerUI();
                }, 200);
            } else {
                // 백2 행동 지정을 위해 메뉴 복귀 팝업 소환
                setTimeout(() => {
                    if (currentPieceData) {
                        const screenPos = currentPieceData.mesh.position.clone().project(camera);
                        mMenu.style.left = `${((screenPos.x * .5 + .5) * window.innerWidth) + 20}px`;
                        mMenu.style.top = `${((screenPos.y * -.5 + .5) * window.innerHeight) - 40}px`;
                        mMenu.style.display = 'flex';
                    }
                }, 400);
            }
        }

        // 루프 렌더링 애니메이션 장치
        function animate() {
            requestAnimationFrame(animate);
            // 가이드 원판 은은하게 회전하는 애니메이션 연출 효과
            tacticalGuides.forEach(g => { g.rotation.z += 0.02; });
            renderer.render(scene, camera);
        }
        animate();

        // 브라우저 리사이즈 보정
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
</script>
</body>
</html>
